name: Build Image
on:
  workflow_call:
    inputs:
      actor:
        required: true
        type: string
      repository:
        required: true
        type: string
jobs:
  build-service-image:
    name: Build Service Image
    runs-on: [ubuntu-latest]
    env:
      REGISTRY: ghcr.io/${{ inputs.repository }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x
      - name: Restore .NET Dependencies
        run: dotnet restore Shopcms.sln
      - name: Build .NET Solution
        run: dotnet build Shopcms.sln -c Release --no-restore
      # No test projects yet — add a `dotnet test` step here once they exist.
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ inputs.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Lowercase Repository Name
        run: |
          REPO_LOWER=$(echo "${{ inputs.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "REGISTRY=ghcr.io/$REPO_LOWER" >> $GITHUB_ENV
      - name: Set TAG environment variable base on commit brand
        run: |
          if [ "${GITHUB_REF_NAME}" = "develop" ]; then
            echo "TAG=dev-latest" >> $GITHUB_ENV
            echo "PROFILE=dev" >> $GITHUB_ENV
          else
            echo "TAG=prod-latest" >> $GITHUB_ENV
            echo "PROFILE=prod" >> $GITHUB_ENV
          fi
      - name: Build and Push Image
        env:
          PROFILE: ${{ env.PROFILE }}
          TAG: ${{ env.TAG }}
        run: |
          docker compose -f .docker/compose.yaml --profile "$PROFILE" build --parallel
          docker compose -f .docker/compose.yaml --profile "$PROFILE" push
