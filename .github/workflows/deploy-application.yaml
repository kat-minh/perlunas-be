name: Deploy Production Server
on:
  workflow_call:
    inputs:
      profile:
        required: true
        type: string
      actor:
        required: true
        type: string
      repository:
        required: true
        type: string
      run-on:
        required: false
        default: self-hosted
        type: string
      tag:
        required: false
        default: develop-latest
        type: string
      environment:
        required: false
        default: dev
        type: string
      pull-profile:
        required: false
        default: dev-pull
        type: string
jobs:
  deploy-application:
    runs-on: ${{ inputs.run-on }}
    environment: ${{ inputs.environment }}
    env:
      REGISTRY: ghcr.io/${{ inputs.repository }}

      # Environment
      ENVIRONMENT: ${{ secrets.ENVIRONMENT }}

      # Postgres
      POSTGRES_DBNAME: ${{ secrets.POSTGRES_DBNAME }}
      POSTGRES_USERNAME: ${{ secrets.POSTGRES_USERNAME }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}

      # Admin credentials (admin login)
      ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}

      # JWT (this service issues and validates its own tokens).
      JWT_ISSUER: ${{ secrets.JWT_ISSUER }}
      JWT_AUDIENCE: ${{ secrets.JWT_AUDIENCE }}
      JWT_ACCESS_TOKEN_KEY: ${{ secrets.JWT_ACCESS_TOKEN_KEY }}
      JWT_ACCESS_TOKEN_EXPIRE_MIN: ${{ secrets.JWT_ACCESS_TOKEN_EXPIRE_MIN }}

      # Cloudinary (admin image upload)
      CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
      CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
      CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}

      # Mail (SMTP)
      MAIL_ADDRESS: ${{ secrets.MAIL_ADDRESS }}
      MAIL_DISPLAY_NAME: ${{ secrets.MAIL_DISPLAY_NAME }}
      MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
      MAIL_HOST: ${{ secrets.MAIL_HOST }}
      MAIL_PORT: ${{ secrets.MAIL_PORT }}

      # Site revalidate (on-demand ISR webhook to the public site)
      SITE_REVALIDATE_URL: ${{ secrets.SITE_REVALIDATE_URL }}
      SITE_REVALIDATE_SECRET: ${{ secrets.SITE_REVALIDATE_SECRET }}

      # CORS allowed origins (Cors:AllowedOrigins array — one secret per index)
      CORS_ALLOWED_ORIGINS_0: ${{ secrets.CORS_ALLOWED_ORIGINS_0 }}
      CORS_ALLOWED_ORIGINS_1: ${{ secrets.CORS_ALLOWED_ORIGINS_1 }}
      CORS_ALLOWED_ORIGINS_2: ${{ secrets.CORS_ALLOWED_ORIGINS_2 }}

      # Cloudflare
      CLOUDFLARE_TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}

      TAG: ${{ inputs.tag }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase Repository Name
        run: |
          REPO_LOWER=$(echo "${{ inputs.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "REGISTRY=ghcr.io/$REPO_LOWER" >> $GITHUB_ENV
      - name: Pull New Image From Registry
        run: docker compose -f .docker/compose.yaml -p perlunas-server-${{ inputs.profile }} --profile ${{ inputs.pull-profile }} pull

      - name: Deploy New Image
        run: docker compose -f .docker/compose.yaml -p perlunas-server-${{ inputs.profile }} --profile ${{ inputs.environment }} up -d

      - name: Prune Old Image
        run: docker image prune -af

      - name: Notify Deployment Success
        run: |
          echo "Deployment completed successfully!"
          echo "API is running and healthy"
